name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: '1.0.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # 从 tag 中提取版本号，如 v1.0.0 -> 1.0.0
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update version
        run: |
          sed -i '' '9s/<version>.*<\/version>/<version>${{ needs.prepare.outputs.version }}<\/version>/' pom.xml
          sed -n '9p' pom.xml

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create DMG package
        run: |
          mkdir -p target/jpackage
          jpackage \
            --input target \
            --main-jar chinese-chess-${{ needs.prepare.outputs.version }}.jar \
            --name ChineseChess \
            --app-version ${{ needs.prepare.outputs.version }} \
            --vendor "ChineseChess Team" \
            --type dmg \
            --dest target/jpackage

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseChess-macOS
          path: target/jpackage/ChineseChess-${{ needs.prepare.outputs.version }}.dmg
          retention-days: 5

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update version
        run: |
          $lines = Get-Content pom.xml
          $lines[8] = '    <version>${{ needs.prepare.outputs.version }}</version>'
          $lines | Set-Content pom.xml -Encoding UTF8
          Get-Content pom.xml | Select-Object -First 9 | Select-Object -Last 1

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create EXE installer
        run: |
          mkdir -p target/jpackage
          jpackage --input target --main-jar chinese-chess-${{ needs.prepare.outputs.version }}.jar --name ChineseChess --app-version ${{ needs.prepare.outputs.version }} --vendor "ChineseChess Team" --type exe --dest target/jpackage

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseChess-Windows
          path: target/jpackage/ChineseChess-${{ needs.prepare.outputs.version }}.exe
          retention-days: 5

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update version
        run: |
          sed -i '9s/<version>.*<\/version>/<version>${{ needs.prepare.outputs.version }}<\/version>/' pom.xml
          sed -n '9p' pom.xml

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot binutils gzip dpkg

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create DEB package
        run: |
          mkdir -p target/jpackage
          jpackage --input target --main-jar chinese-chess-${{ needs.prepare.outputs.version }}.jar --name ChineseChess --app-version ${{ needs.prepare.outputs.version }} --vendor "ChineseChess Team" --type deb --dest target/jpackage
        continue-on-error: true

      - name: Check if DEB was created
        id: check_deb
        run: |
          if [ -f target/jpackage/ChineseChess-${{ needs.prepare.outputs.version }}.deb ]; then
            echo "DEB_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "DEB_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        if: steps.check_deb.outputs.DEB_EXISTS == 'true'
        with:
          name: ChineseChess-Linux
          path: target/jpackage/ChineseChess-${{ needs.prepare.outputs.version }}.deb
          retention-days: 5

  create-release:
    needs: [prepare, build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: Flatten artifacts
        run: |
          mkdir -p release-flat
          find release-files -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" \) -exec cp {} release-flat/ \;
          ls -la release-flat/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-flat/*
          draft: false
          body: "中国象棋桌面应用 v${{ needs.prepare.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
