name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create DMG package
        run: |
          mkdir -p target/jpackage
          jpackage \
            --input target \
            --main-jar chinese-chess-1.0.0.jar \
            --name ChineseChess \
            --app-version 1.0.0 \
            --vendor "ChineseChess Team" \
            --type dmg \
            --dest target/jpackage

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseChess-macOS
          path: target/jpackage/ChineseChess-1.0.0.dmg
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create EXE installer
        run: |
          mkdir -p target/jpackage
          jpackage --input target --main-jar chinese-chess-1.0.0.jar --name ChineseChess --app-version 1.0.0 --vendor "ChineseChess Team" --type exe --dest target/jpackage

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseChess-Windows
          path: target/jpackage/ChineseChess-1.0.0.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot libfakeroot

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create DEB package
        run: |
          mkdir -p target/jpackage
          jpackage --input target --main-jar chinese-chess-1.0.0.jar --name ChineseChess --app-version 1.0.0 --vendor "ChineseChess Team" --type deb --dest target/jpackage
        continue-on-error: true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: ChineseChess-Linux
          path: target/jpackage/ChineseChess-1.0.0.deb
          retention-days: 5
          if-no-files-found: ignore

  create-release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.event.head_commit.message, 'release')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ChineseChess-macOS
          path: release-files
        continue-on-error: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ChineseChess-Windows
          path: release-files
        continue-on-error: true

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ChineseChess-Linux
          path: release-files
        continue-on-error: true

      - name: List files
        run: |
          mkdir -p release-files
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
