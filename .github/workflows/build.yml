name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION: '1.0.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_release: ${{ steps.version.outputs.IS_RELEASE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from commit
        id: version
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          VERSION="1.0.0"

          # 从 commit 消息中提取版本号，支持格式：
          # release: v1.0.1
          # release v1.0.1
          # 发布 v1.0.1
          if [[ "$COMMIT_MSG" =~ release[:\ ]+v?([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ "$COMMIT_MSG" =~ 发布[:\ ]+v?([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          fi

          # 判断是否发版
          IS_RELEASE="false"
          if [[ "$COMMIT_MSG" =~ release ]] || [[ "$COMMIT_MSG" =~ 发布 ]]; then
            IS_RELEASE="true"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Commit: $COMMIT_MSG"
          echo "Version: $VERSION"
          echo "Is Release: $IS_RELEASE"

  build-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update version
        if: needs.prepare.outputs.is_release == 'true'
        run: |
          sed -i '' "s/<version>.*<\/version>/<version>${{ needs.prepare.outputs.version }}<\/version>/" pom.xml
          cat pom.xml | grep '<version>'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create DMG package
        run: |
          mkdir -p target/jpackage
          jpackage \
            --input target \
            --main-jar chinese-chess-${{ needs.prepare.outputs.version }}.jar \
            --name ChineseChess \
            --app-version ${{ needs.prepare.outputs.version }} \
            --vendor "ChineseChess Team" \
            --type dmg \
            --dest target/jpackage

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseChess-macOS
          path: target/jpackage/ChineseChess-${{ needs.prepare.outputs.version }}.dmg
          retention-days: 5

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update version
        if: needs.prepare.outputs.is_release == 'true'
        run: |
          (Get-Content pom.xml) -replace '<version>.*</version>', "<version>${{ needs.prepare.outputs.version }}</version>" | Set-Content pom.xml

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create EXE installer
        run: |
          mkdir -p target/jpackage
          jpackage --input target --main-jar chinese-chess-${{ needs.prepare.outputs.version }}.jar --name ChineseChess --app-version ${{ needs.prepare.outputs.version }} --vendor "ChineseChess Team" --type exe --dest target/jpackage

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseChess-Windows
          path: target/jpackage/ChineseChess-${{ needs.prepare.outputs.version }}.exe
          retention-days: 5

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update version
        if: needs.prepare.outputs.is_release == 'true'
        run: |
          sed -i "s/<version>.*<\/version>/<version>${{ needs.prepare.outputs.version }}<\/version>/" pom.xml
          cat pom.xml | grep '<version>'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot binutils gzip dpkg

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create DEB package
        run: |
          mkdir -p target/jpackage
          jpackage --input target --main-jar chinese-chess-${{ needs.prepare.outputs.version }}.jar --name ChineseChess --app-version ${{ needs.prepare.outputs.version }} --vendor "ChineseChess Team" --type deb --dest target/jpackage
        continue-on-error: true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: ChineseChess-Linux
          path: target/jpackage/ChineseChess-${{ needs.prepare.outputs.version }}.deb
          retention-days: 5
          if-no-files-found: ignore

  create-release:
    needs: [prepare, build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.is_release == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: Flatten artifacts
        run: |
          mkdir -p release-flat
          find release-files -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" \) -exec cp {} release-flat/ \;
          ls -la release-flat/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-flat/*
          draft: true
          body: "中国象棋桌面应用 v${{ needs.prepare.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
